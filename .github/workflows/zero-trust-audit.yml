name: Zero Trust Audit

on:
  workflow_dispatch:
  pull_request:
  push:
    paths:
      - "README.md"
      - "PUBLIC_AUDIT_LOCATOR_INDEX_V0_1.md"
      - "SIGN_UP_AND_FEEDBACK_V0_1.md"
      - "tools/**"
      - "metadata/**"
      - "schemas/**"
      - "drills/**"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Verify repo metadata
        run: |
          set +e
          python3 tools/verify-this-repo.py --json > zero-trust-audit-report.json
          status=$?
          python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('zero-trust-audit-report.json').read_text())
          compact = {
              'status': report.get('status'),
              'strict': report.get('strict'),
              'failures': report.get('failures', []),
              'warnings_count': len(report.get('warnings', [])),
              'warnings_head': report.get('warnings', [])[:25],
              'json_files_checked': report.get('json_files_checked'),
              'state_file': report.get('state_file'),
          }
          print(json.dumps(compact, indent=2, sort_keys=True))
          PY
          exit $status
      - name: Summary
        if: always()
        run: |
          echo "# Zero Trust Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository: $GITHUB_REPOSITORY" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
          echo "Project: jaywisdom.base.eth" >> "$GITHUB_STEP_SUMMARY"
          echo "Report file: zero-trust-audit-report.json" >> "$GITHUB_STEP_SUMMARY"
