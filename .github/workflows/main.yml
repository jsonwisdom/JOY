name: JoySpace Pages Notice

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: Explain Pages setup
        run: |
          echo "JoySpace index.html exists at repo root."
          echo "To publish the website, enable GitHub Pages manually once:"
          echo "Repo Settings -> Pages -> Build and deployment -> Source: Deploy from a branch"
          echo "Branch: main / root -> Save"
          echo "Then open https://jsonwisdom.github.io/JOY/"
          echo "Authority remains false."
