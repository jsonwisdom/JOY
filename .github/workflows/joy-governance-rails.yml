# Queue poke: 2026-07-09T06:33:00Z
name: JOY Governance Rails v0.1

on:
  pull_request:
  push:
    branches: [main]

jobs:
  joy-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check forbidden authority claims in governed data
        run: |
          scan_paths="receipts metadata schemas artifacts membranes adapters engines examples"
          for p in $scan_paths; do
            [ -e "$p" ] || continue
            ! grep -R "authority[\"': ]*true" "$p" \
              --exclude-dir=.git \
              --exclude="*.png" \
              --exclude="*.jpg"
          done

      - name: Check no fake green in governed data
        run: |
          scan_paths="receipts metadata schemas artifacts membranes adapters engines examples"
          for p in $scan_paths; do
            [ -e "$p" ] || continue
            ! grep -R "green_implied[\"': ]*true" "$p" \
              --exclude-dir=.git
          done

      - name: Block unverifiable load_verified in governed data
        run: |
          scan_paths="receipts metadata schemas artifacts membranes adapters engines examples"
          for p in $scan_paths; do
            [ -e "$p" ] || continue
            ! grep -R "load_verified[\"': ]*true" "$p" \
              --exclude-dir=.git
          done

      - name: Block public release without consent in governed data
        run: |
          scan_paths="receipts metadata schemas artifacts membranes adapters engines examples"
          for p in $scan_paths; do
            [ -e "$p" ] || continue
            ! grep -R "public_release_allowed[\"': ]*true" "$p" \
              --exclude-dir=.git
          done

      - name: Block private family data in public paths
        run: |
          if [ -d public ]; then
            ! grep -R "family/" public --exclude-dir=.git || true
          fi

      - name: Validate JSON
        run: |
          find . -name "*.json" -not -path "./.git/*" -print0 |
          xargs -0 -n1 python -m json.tool >/dev/null

      - name: Require consent boundary doctrine
        run: |
          grep -R "JOY_NO_FAKE_GREEN" canon .github || exit 1

      - name: Mrs. Wisdom gate for family and wisdom membrane
        run: |
          files=$(git diff --name-only HEAD~1..HEAD || true)
          echo "$files" | grep -E "(^family/|^FAMILY/|^membranes/wisdom_membrane/|^receipts/decisions/|public.*metadata)" && \
          grep -R "wisdom_review_required[\"': ]*true" . || true
