name: JoySpace Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install jsonschema
      - run: python scripts/validate_joyspace.py

      - name: Emit L3 runtime payload
        run: python scripts/l3_emit_runtime_payload.py
