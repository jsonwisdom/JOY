<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Mrs. Wisdom Birthday Frame Portrait</title>
  <desc id="desc">A warm stylized birthday portrait card for the reusable JoySpace Boss Birthday frame.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#fff2a8"/>
      <stop offset="42%" stop-color="#d48a2a"/>
      <stop offset="100%" stop-color="#27102f"/>
    </radialGradient>
    <linearGradient id="forest" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0c2b20"/>
      <stop offset="0.55" stop-color="#1a4f35"/>
      <stop offset="1" stop-color="#120817"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#forest)"/>
  <circle cx="600" cy="360" r="430" fill="url(#glow)" opacity="0.92"/>
  <g opacity="0.35" fill="#06180f">
    <path d="M90 1260 210 700l120 560z"/>
    <path d="M240 1280 390 520l150 760z"/>
    <path d="M710 1300 865 570l155 730z"/>
    <path d="M930 1260 1050 690l120 570z"/>
  </g>
  <g filter="url(#softShadow)">
    <rect x="165" y="210" width="870" height="1080" rx="70" fill="rgba(255,250,230,0.18)" stroke="#f8d474" stroke-width="8"/>
    <rect x="225" y="270" width="750" height="960" rx="52" fill="rgba(0,0,0,0.34)" stroke="#fff1a6" stroke-width="3"/>
  </g>
  <text x="600" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="128" font-weight="700" fill="#fff6d5">Mrs.</text>
  <text x="600" y="560" text-anchor="middle" font-family="Georgia, serif" font-size="148" font-weight="700" fill="#ffe27a">Wisdom</text>
  <text x="600" y="705" text-anchor="middle" font-family="Georgia, serif" font-size="82" fill="#fff6d5">Birthday Girl</text>
  <text x="600" y="835" text-anchor="middle" font-family="Georgia, serif" font-size="52" fill="#ffd36b">364 other days.</text>
  <text x="600" y="910" text-anchor="middle" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#ffffff">This one is mine.</text>
  <text x="600" y="1090" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#fff3c4">LOVE FIRST · RECEIPTS SECOND</text>
  <text x="600" y="1165" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#eacb7b">JOYSPACE / BOSS BIRTHDAY FRAME</text>
</svg>
