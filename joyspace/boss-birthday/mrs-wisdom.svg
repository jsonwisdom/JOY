<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">Mrs. Wisdom Boss Birthday Render</title>
  <desc id="desc">A warm stylized JoySpace Boss Birthday portrait card for Mrs. Wisdom, with forest, gold frame, Love First doctrine, and reusable frame marks.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="24%" r="68%">
      <stop offset="0%" stop-color="#fff8bc"/>
      <stop offset="38%" stop-color="#f0bf48"/>
      <stop offset="74%" stop-color="#63345a"/>
      <stop offset="100%" stop-color="#15071d"/>
    </radialGradient>
    <linearGradient id="forest" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071b18"/>
      <stop offset="0.48" stop-color="#1d5838"/>
      <stop offset="1" stop-color="#130719"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff4ae"/>
      <stop offset="0.48" stop-color="#d49128"/>
      <stop offset="1" stop-color="#fff0a0"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%"><feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.48"/></filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="1500" fill="url(#forest)"/>
  <circle cx="600" cy="330" r="470" fill="url(#halo)" opacity="0.94"/>
  <g opacity="0.42" fill="#04130e"><path d="M28 1325 148 730l120 595z"/><path d="M170 1355 334 505l164 850z"/><path d="M744 1375 902 560l158 815z"/><path d="M962 1335 1082 705l120 630z"/></g>
  <g filter="url(#shadow)"><rect x="132" y="170" width="936" height="1160" rx="82" fill="#fff6d2" opacity="0.18" stroke="url(#gold)" stroke-width="10"/><rect x="192" y="230" width="816" height="1040" rx="62" fill="#100a14" opacity="0.72" stroke="#fff1a6" stroke-width="4"/><rect x="238" y="286" width="724" height="928" rx="46" fill="#ffffff" opacity="0.055" stroke="#f3c85c" stroke-width="2"/></g>
  <g filter="url(#glow)"><text x="600" y="382" text-anchor="middle" font-family="Georgia, serif" font-size="118" font-weight="700" fill="#fff7d8">Mrs.</text><text x="600" y="535" text-anchor="middle" font-family="Georgia, serif" font-size="154" font-weight="700" fill="#ffe27a">Wisdom</text><text x="600" y="674" text-anchor="middle" font-family="Georgia, serif" font-size="78" font-weight="700" fill="#fff6d5">Birthday Girl</text><text x="600" y="815" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#ffd36b">364 other days.</text><text x="600" y="898" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff">This one is mine.</text></g>
  <g font-family="Arial, sans-serif" font-weight="800" text-anchor="middle"><text x="600" y="1044" font-size="42" fill="#fff3c4">LOVE FIRST · RECEIPTS SECOND</text><text x="600" y="1117" font-size="32" fill="#eacb7b">JOYSPACE / BOSS BIRTHDAY FRAME V0.3</text><text x="600" y="1170" font-size="26" fill="#cfae6b">FRAME STAYS · PAYLOAD CHANGES · BOSS RENDERS INSIDE</text></g>
  <g transform="translate(308 1220)"><rect width="584" height="64" rx="32" fill="#ffe183" opacity="0.94"/><text x="292" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="900" fill="#211307">COMPUTER WISDOM AS A SERVICE</text></g>
</svg>
